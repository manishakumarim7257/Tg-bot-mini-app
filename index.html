<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <!-- Icons ke liye FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://telegram.org"></script>
    <style>
        /* Base Setup - WhatsApp Dark Theme */
        html, body { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #0b141a !important; color: #ffffff; 
            font-family: Arial, sans-serif; overflow: hidden; 
        }
        
        /* Profile Content Layout Area */
        .profile-main-content { 
            height: calc(100% - 70px); overflow-y: auto; 
            padding: 15px; box-sizing: border-box; 
        }

        /* WhatsApp Style Bottom Navbar */
        .bottom-navbar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; 
            background-color: #0b141a; border-top: 1px solid #222e35; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 99999; box-sizing: border-box; 
        }

        .nav-item { 
            background: none; border: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            width: 100%; height: 100%; text-decoration: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* Icon Capsule Background Effect */
        .icon-wrapper { 
            display: flex; align-items: center; justify-content: center; 
            width: 55px; height: 32px; border-radius: 16px; 
            color: #8696a0; font-size: 18px; transition: all 0.2s ease; 
        }

        .nav-label { 
            font-size: 12px; color: #8696a0; margin-top: 4px; font-weight: 500; 
        }

        /* Profile Tab Active Highlight (Aapki photo jaisa) */
        .nav-item.active .icon-wrapper { 
            background-color: rgba(0, 168, 132, 0.2); color: #00a884; 
        }
        .nav-item.active .nav-label { 
            color: #00a884; font-weight: bold; 
        }
    </style>
</head>
<body>

    <!-- 1. Profile Page ka Content Container -->
    <div class="profile-main-content">

        <!-- ⚠️ AAPKA PURANA PROFILE.HTML KA POORA CODE YAHAN PASTE KAREIN -->
        
        </script>
        <!-- ⚠️ AAPKA PROFILE.HTML KA CODE YAHAN TAK KHATAM HOGA -->

    </div>

    <!-- WhatsApp Style Navigation Bar (Isme Profile Active rahega) -->
    <nav class="bottom-navbar">
        <!-- Home click karne par home.html par redirect hoga -->
        <a href="home.html" class="nav-item">
            <div class="icon-wrapper"><i class="fa-solid fa-house"></i></div>
            <span class="nav-label">Home</span>
        </a>
        
        <!-- Profile click karne par isi index.html par rahega -->
        <a href="index.html" class="nav-item active">
            <div class="icon-wrapper"><i class="fa-solid fa-user"></i></div>
            <span class="nav-label">Profile</span>
        </a>
        
        <!-- Owner click karne par owner.html par redirect hoga -->
        <a href="owner.html" class="nav-item">
            <div class="icon-wrapper"><i class="fa-solid fa-user-shield"></i></div>
            <span class="nav-label">Owner</span>
        </a>
    </nav>

</body>
</html>
