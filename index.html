<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <!-- Icons ke liye FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://telegram.org"></script>
    <style>
        /* Base Styling */
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #0b141a; overflow: hidden; font-family: Arial, sans-serif;
        }

        /* Iframe Container jahan aapki original files khulengi */
        .content-frame {
            width: 100%;
            height: calc(100% - 70px); /* Navbar ke liye space chhoda */
            border: none;
            background-color: #0b141a;
        }

        /* WhatsApp Style Bottom Navbar */
        .bottom-navbar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background-color: #0b141a; border-top: 1px solid #222e35;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .nav-item {
            background: none; border: none; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            width: 100%; height: 100%; -webkit-tap-highlight-color: transparent;
        }

        /* Capsule Background Effect (Aapki Photo Jaisa) */
        .icon-wrapper {
            display: flex; align-items: center; justify-content: center;
            width: 55px; height: 32px; border-radius: 16px;
            color: #8696a0; font-size: 18px; transition: all 0.2s ease;
        }

        .nav-label {
            font-size: 12px; color: #8696a0; margin-top: 4px; font-weight: 500;
        }

        /* ACTIVE TAB STYLE */
        .nav-item.active .icon-wrapper {
            background-color: rgba(0, 168, 132, 0.2); /* Light Green Bubble */
            color: #00a884; /* WhatsApp Teal Color */
        }
        .nav-item.active .nav-label {
            color: #00a884; font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Default me sabse pehle home.html dikhega -->
    <iframe id="main-app-frame" src="home.html" class="content-frame"></iframe>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-navbar">
        <button class="nav-item active" onclick="changeTab('home.html', this)">
            <div class="icon-wrapper"><i class="fa-solid fa-house"></i></div>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" onclick="changeTab('profile.html', this)">
            <div class="icon-wrapper"><i class="fa-solid fa-user"></i></div>
            <span class="nav-label">Profile</span>
        </button>
        <button class="nav-item" onclick="changeTab('owner.html', this)">
            <div class="icon-wrapper"><i class="fa-solid fa-user-shield"></i></div>
            <span class="nav-label">Owner</span>
        </button>
    </nav>

    <script>
        // Telegram App Setup
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function changeTab(pageUrl, buttonElement) {
            // Iframe me select kiya hua page load karein
            document.getElementById('main-app-frame').src = pageUrl;

            // Purane active button se green color hatayein
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            
            // Naye button ko active green karein
            buttonElement.classList.add('active');

            // Telegram me halka vibration effect (vibrate)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }
    </script>
</body>
</html>
