<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <!-- Icons ke liye FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://telegram.org"></script>
    <style>
        /* Base Setup */
        body {
            margin: 0; padding: 0; font-family: Arial, sans-serif;
            background-color: #0b141a; color: #ffffff; padding-bottom: 80px;
        }
        
        /* Container jahan aapka purana page bina iframe ke khulega */
        #app-content { width: 100%; margin: 0; padding: 0; }

        /* WhatsApp Style Bottom Navbar */
        .bottom-navbar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background-color: #0b141a; border-top: 1px solid #222e35;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .nav-item {
            background: none; border: none; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            width: 100%; height: 100%; -webkit-tap-highlight-color: transparent;
        }

        /* Active circle profile bubble layout */
        .icon-wrapper {
            display: flex; align-items: center; justify-content: center;
            width: 55px; height: 32px; border-radius: 16px;
            color: #8696a0; font-size: 18px; transition: all 0.2s ease;
        }

        .nav-label {
            font-size: 12px; color: #8696a0; margin-top: 4px; font-weight: 500;
        }

        /* Active style trigger */
        .nav-item.active .icon-wrapper {
            background-color: rgba(0, 168, 132, 0.2);
            color: #00a884;
        }
        .nav-item.active .nav-label {
            color: #00a884; font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Yahan aapki purani files ka content aayega (No security blockage) -->
    <div id="app-content"></div>

    <!-- WhatsApp Layout Navigation Bar -->
    <nav class="bottom-navbar">
        <button class="nav-item active" onclick="loadPage('home.html', this)">
            <div class="icon-wrapper"><i class="fa-solid fa-house"></i></div>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" onclick="loadPage('profile.html', this)">
            <div class="icon-wrapper"><i class="fa-solid fa-user"></i></div>
            <span class="nav-label">Profile</span>
        </button>
        <button class="nav-item" onclick="loadPage('owner.html', this)">
            <div class="icon-wrapper"><i class="fa-solid fa-user-shield"></i></div>
            <span class="nav-label">Owner</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        async function loadPage(pageName, buttonElement) {
            try {
                const response = await fetch(pageName);
                if (!response.ok) throw new Error('Page mil nahi raha hai');
                
                const htmlText = await response.text();
                
                // Pure page ko load karne ke liye parse karna
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                // Pura HTML body content nikalna bina use chhuye
                const pageBody = doc.body ? doc.body.innerHTML : htmlText;
                document.getElementById('app-content').innerHTML = pageBody;

                // Ek zaroori cheez: Jo JavaScript code profile.html ke andar hai use force execute karna
                const scripts = document.getElementById('app-content').querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                // Tab active change logic
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                buttonElement.classList.add('active');

                // Vibration feedback
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            } catch (error) {
                console.error('Error loading page:', error);
                document.getElementById('app-content').innerHTML = '<p style="color:red; text-align:center; padding-top:20px;">Page load karne me error aayi!</p>';
            }
        }

        // Pehli baar khulne par home.html automatic load ho
        window.onload = function() {
            const defaultBtn = document.querySelector('.nav-item');
            loadPage('home.html', defaultBtn);
        };
    </script>
</body>
</html>
