<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <!-- Icons ke liye FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://telegram.org"></script>
    <style>
        /* Base Setup - WhatsApp Dark Theme */
        html, body { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #0b141a !important; color: #ffffff; 
            font-family: Arial, sans-serif; overflow: hidden; 
        }
        
        /* Profile Content Layout Area */
        .profile-main-content { 
            height: calc(100% - 70px); overflow-y: auto; 
            padding: 15px; box-sizing: border-box; 
        }

        /* WhatsApp Style Bottom Navbar */
        .bottom-navbar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; 
            background-color: #0b141a; border-top: 1px solid #222e35; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 99999; box-sizing: border-box; 
        }

        .nav-item { 
            background: none; border: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            width: 100%; height: 100%; text-decoration: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* Icon Capsule Background Effect */
        .icon-wrapper { 
            display: flex; align-items: center; justify-content: center; 
            width: 55px; height: 32px; border-radius: 16px; 
            color: #8696a0; font-size: 18px; transition: all 0.2s ease; 
        }

        .nav-label { 
            font-size: 12px; color: #8696a0; margin-top: 4px; font-weight: 500; 
        }

        /* Profile Tab Active Highlight (Aapki photo jaisa) */
        .nav-item.active .icon-wrapper { 
            background-color: rgba(0, 168, 132, 0.2); color: #00a884; 
        }
        .nav-item.active .nav-label { 
            color: #00a884; font-weight: bold; 
        }
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Mini App</title>
    <!-- Telegram Web App Script (Head me load hona jaroori hai) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h3 { margin-top: 0; color: #2481cc; }
        p { margin: 5px 0; font-size: 14px; }
        .bold { font-weight: bold; }
        
        /* 🌟 प्रोफाइल फोटो के लिए नया डिज़ाइन */
        .avatar-container {
            text-align: center;
            margin-bottom: 15px;
        }
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #2481cc;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            margin: 0 auto;
        }
  </style>
</head>
<body>

    <!-- 1. Profile Page ka Content Container -->
        <!-- ⚠️ AAPKA PURANA PROFILE.HTML KA POORA CODE YAHAN PASTE KAREIN -->
         <!-- Feature 1: User Details -->
    <div class="card" id="user-card">
        <h3>👤 User Details (You)</h3>
        
        <!-- 🌟 नया प्रोफाइल फोटो का सेक्शन -->
        <div class="avatar-container">
            <!-- शुरू में एक डिफ़ॉल्ट यूजर इमेज लोड होगी -->
            <img id="u-avatar" class="user-avatar" src="https://cloudflare.com" alt="User DP">
        </div>

        <p><span class="bold">Name:</span> <span id="u-name">Loading...</span></p>
        <p><span class="bold">Username:</span> <span id="u-username">Loading...</span></p>
        <p><span class="bold">ID:</span> <span id="u-id">Loading...</span></p>
        <p><span class="bold">Language:</span> <span id="u-lang">Loading...</span></p>
    </div>

    
<script>
        function initTelegramApp() {
            // Telegram WebApp Object Check
            const tg = window.Telegram?.WebApp;

            if (tg) {
                tg.ready(); 
                tg.expand(); 

                // Data fetch karne ki koshish karein
                const user = tg.initDataUnsafe?.user; 

                if (user && user.id) {
                    // Agar user mil gaya toh loading hatao aur details dikhao
                    document.getElementById('u-name').innerText = `${user.first_name} ${user.last_name || ''}`;
                    document.getElementById('u-username').innerText = user.username ? `@${user.username}` : 'No Username';
                    document.getElementById('u-id').innerText = user.id;
                    document.getElementById('u-lang').innerText = user.language_code || 'en';
                    
                    // 🌟 अगर टेलीग्राम यूजर की फोटो का यूआरएल देता है तो उसे अपडेट करें
                    if (user.photo_url) {
                        document.getElementById('u-avatar').src = user.photo_url;
                    }
                    
                    // Interval ko rokne ke liye
                    clearInterval(checkInterval);
                }
            }
        }

        // Agar data slow load ho raha hai, toh yeh har 500ms (0.5 second) me check karega
        const checkInterval = setInterval(initTelegramApp, 500);

        // Max 5 seconds tak check karega, agar fir bhi nahi mila toh Browser mode default data dikhayega
        setTimeout(() => {
            clearInterval(checkInterval);
            if (document.getElementById('u-id').innerText === "Loading...") {
                document.getElementById('u-name').innerText = "Web Browser Mode";
                document.getElementById('u-username').innerText = "@not_inside_tg";
                document.getElementById('u-id').innerText = "Offline_ID_101";
                document.getElementById('u-lang').innerText = "en";
                // ब्राउज़र मोड में एक फूल वाली डिफ़ॉल्ट इमेज दिखेगी
                document.getElementById('u-avatar').src = "https://cloudflare.com";
            }
        }, 5000);
</script>
        <!-- ⚠️ AAPKA PROFILE.HTML KA CODE YAHAN TAK KHATAM HOGA -->

    </div>

    <!-- WhatsApp Style Navigation Bar (Isme Profile Active rahega) -->
    <nav class="bottom-navbar">
        <!-- Home click karne par home.html par redirect hoga -->
        <a href="home.html" class="nav-item">
            <div class="icon-wrapper"><i class="fa-solid fa-house"></i></div>
            <span class="nav-label">Home</span>
        </a>
        
        <!-- Profile click karne par isi index.html par rahega -->
        <a href="index.html" class="nav-item active">
            <div class="icon-wrapper"><i class="fa-solid fa-user"></i></div>
            <span class="nav-label">Profile</span>
        </a>
        
        <!-- Owner click karne par owner.html par redirect hoga -->
        <a href="owner.html" class="nav-item">
            <div class="icon-wrapper"><i class="fa-solid fa-user-shield"></i></div>
            <span class="nav-label">Owner</span>
        </a>
    </nav>

</body>
</html>
